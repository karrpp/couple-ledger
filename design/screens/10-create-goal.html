<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#e2e3e1",
                    "primary-fixed": "#d4e3ff",
                    "surface-variant": "#e2e3e1",
                    "secondary": "#526069",
                    "on-surface": "#1a1c1b",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#414751",
                    "on-secondary-fixed": "#0f1d25",
                    "surface-tint": "#0060ac",
                    "secondary-fixed": "#d6e5ef",
                    "on-primary-fixed": "#001c39",
                    "on-primary-fixed-variant": "#004883",
                    "inverse-surface": "#2f3130",
                    "surface-container": "#eeeeec",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f4f4f2",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f1f1ef",
                    "surface": "#f9f9f7",
                    "secondary-container": "#d3e2ed",
                    "tertiary-container": "#6f7678",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#dde4e6",
                    "on-tertiary-container": "#f9fdff",
                    "outline-variant": "#c1c7d3",
                    "on-tertiary": "#ffffff",
                    "on-background": "#1a1c1b",
                    "surface-dim": "#dadad8",
                    "surface-container-high": "#e8e8e6",
                    "surface-bright": "#f9f9f7",
                    "error": "#ba1a1a",
                    "on-primary-container": "#fdfcff",
                    "on-tertiary-fixed-variant": "#41484a",
                    "outline": "#717783",
                    "secondary-fixed-dim": "#bac9d3",
                    "primary-fixed-dim": "#a4c9ff",
                    "inverse-primary": "#a4c9ff",
                    "primary-container": "#2976c7",
                    "tertiary-fixed-dim": "#c1c8ca",
                    "on-tertiary-fixed": "#161d1f",
                    "background": "#f9f9f7",
                    "on-secondary-container": "#56656e",
                    "primary": "#005da7",
                    "on-secondary-fixed-variant": "#3b4951",
                    "error-container": "#ffdad6",
                    "tertiary": "#565d5f",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#f9f9f7] dark:bg-gray-900 flex items-center justify-between px-6 py-4 w-full z-50">
<button class="text-[#414751] hover:bg-[#f4f4f2] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#0060ac]">New Wish Goal</h1>
<button class="text-[#414751] hover:bg-[#f4f4f2] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-md px-6 pt-4 pb-32 space-y-8">
<!-- Goal Photo Section -->
<section class="flex flex-col items-center">
<div class="w-full h-48 bg-surface-container-low rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 active:scale-[0.98] transition-transform cursor-pointer relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-outline text-4xl mb-2" data-icon="photo_camera">photo_camera</span>
<span class="text-on-surface-variant font-medium text-sm">사진 추가 (선택)</span>
</div>
</section>
<!-- Goal Name & Emoji Section -->
<section class="space-y-4">
<div class="space-y-2">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-md py-4 px-5 text-xl font-bold placeholder:text-outline-variant/60" placeholder="목표 이름" type="text"/>
<p class="text-on-surface-variant/60 text-xs px-1">e.g., '제주도 여행', '맛집 탐방'</p>
</div>
<!-- Emoji Picker -->
<div class="flex items-center gap-3 overflow-x-auto no-scrollbar py-2">
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🍽️</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🏖️</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🎁</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🎧</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">👗</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🏠</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">💍</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🎂</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">✈️</div>
<div class="flex-none w-12 h-12 bg-white rounded-full flex items-center justify-center border border-outline-variant/20 shadow-sm text-xl cursor-pointer hover:bg-primary-fixed transition-colors">🎮</div>
<div class="flex-none px-4 h-10 bg-surface-container-high rounded-full flex items-center justify-center text-xs font-bold text-on-surface-variant cursor-pointer whitespace-nowrap">직접 선택</div>
</div>
</section>
<!-- Target Amount Section -->
<section class="space-y-4">
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-md py-5 px-5 text-3xl font-black text-right pr-12 placeholder:text-outline-variant/40" placeholder="0" type="text"/>
<span class="absolute right-5 top-1/2 -translate-y-1/2 text-xl font-bold text-on-surface-variant">원</span>
</div>
<div class="flex gap-2 overflow-x-auto no-scrollbar">
<button class="px-4 py-2 bg-white border border-outline-variant/30 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-primary-fixed transition-colors">100,000</button>
<button class="px-4 py-2 bg-white border border-outline-variant/30 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-primary-fixed transition-colors">300,000</button>
<button class="px-4 py-2 bg-white border border-outline-variant/30 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-primary-fixed transition-colors">500,000</button>
<button class="px-4 py-2 bg-white border border-outline-variant/30 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-primary-fixed transition-colors">1,000,000</button>
</div>
</section>
<!-- Target Date Section -->
<section class="p-6 bg-surface-container-low rounded-lg space-y-4">
<div class="flex items-center justify-between">
<span class="text-sm font-bold text-on-surface-variant">목표 날짜</span>
<div class="flex items-center gap-2 text-primary font-bold">
<span>2024.12.31</span>
<span class="material-symbols-outlined text-lg" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="flex flex-col items-center py-2 bg-white/50 rounded-md">
<span class="text-2xl font-black text-on-surface">D-45일 남음</span>
<span class="text-[13px] font-medium text-emerald-600 mt-1">하루 약 22,200원씩 모으면 달성!</span>
</div>
</section>
<!-- Priority Section -->
<section class="space-y-3">
<span class="text-sm font-bold text-on-surface-variant px-1">우선순위</span>
<div class="grid grid-cols-3 gap-3">
<div class="flex flex-col items-center justify-center p-4 rounded-md bg-white border border-coral-200/50 hover:bg-[#fff5f5] cursor-pointer transition-colors group">
<span class="text-xl mb-1">🔥</span>
<span class="text-xs font-bold text-[#ff6b6b]">높음</span>
</div>
<div class="flex flex-col items-center justify-center p-4 rounded-md bg-primary-fixed border-2 border-primary/20 shadow-sm cursor-pointer transition-all scale-105 ring-4 ring-primary/5">
<span class="text-xl mb-1">⭐</span>
<span class="text-xs font-bold text-primary">보통</span>
</div>
<div class="flex flex-col items-center justify-center p-4 rounded-md bg-white border border-outline-variant/20 hover:bg-surface-container-high cursor-pointer transition-colors">
<span class="text-xl mb-1">💤</span>
<span class="text-xs font-bold text-outline">낮음</span>
</div>
</div>
</section>
<!-- Memo Section -->
<section class="pb-12">
<textarea class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-md py-4 px-5 min-h-[120px] placeholder:text-outline-variant/60 text-sm font-medium" placeholder="목표 설명 (선택)"></textarea>
</section>
</main>
<!-- Bottom Button Fixed -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-surface via-surface to-transparent pointer-events-none">
<div class="max-w-md mx-auto pointer-events-auto">
<button class="w-full bg-[#0060ac] hover:bg-[#005da7] text-white py-5 rounded-full font-bold text-lg shadow-[0px_24px_48px_rgba(0,96,172,0.15)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>목표 만들기</span>
<span class="text-xl">🎯</span>
</button>
</div>
</div>
<!-- BottomNavBar (Hidden for Focused Task) -->
<!-- As per rule: Suppress shell for focused transactional/creation flows -->
</body></html>

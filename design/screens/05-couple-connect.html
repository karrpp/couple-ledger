<!DOCTYPE html>

<style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Be Vietnam Pro', 'Pretendard', sans-serif; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface min-h-screen selection:bg-primary-container/30">
<!-- TopAppBar -->
<nav class="bg-sky-50 dark:bg-slate-950 flex justify-between items-center px-6 py-4 w-full sticky top-0 z-50">
<button class="scale-95 active:opacity-80 transition-all text-rose-500 dark:text-rose-400">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold leading-tight text-xl tracking-tight text-rose-600 dark:text-rose-400">커플 연결</h1>
<button class="scale-95 active:opacity-80 transition-all text-rose-500 dark:text-rose-400">
<span class="material-symbols-outlined text-2xl" data-icon="notifications">notifications</span>
</button>
</nav>
<main class="max-w-md mx-auto px-6 pt-8 pb-32">
<!-- Center Illustration -->
<div class="flex flex-col items-center mb-10">
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Abstract "Together" Illustration -->
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="z-10 flex items-center justify-center -space-x-8">
<div class="w-24 h-24 bg-surface-tint rounded-full shadow-2xl flex items-center justify-center border-4 border-surface shadow-[0_12px_32px_-4px_rgba(174,47,52,0.15)]">
<span class="material-symbols-outlined text-surface text-4xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="w-24 h-24 bg-tertiary rounded-full shadow-2xl flex items-center justify-center border-4 border-surface shadow-[0_12px_32px_-4px_rgba(0,98,160,0.15)]">
<span class="material-symbols-outlined text-surface text-4xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
<h2 class="text-2xl font-headline font-extrabold text-on-surface mt-6 text-center leading-tight">초대코드를 공유하여<br/>커플 가계부를 시작하세요</h2>
<p class="text-on-surface-variant text-center mt-3 font-body text-sm leading-relaxed">상대방이 코드를 입력하면 함께<br/>지출 관리를 시작할 수 있어요.</p>
</div>
<!-- Invite Code Section -->
<div class="bg-surface-container rounded-lg p-8 mb-8 text-center relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-8xl" data-icon="link">link</span>
</div>
<span class="text-xs font-bold text-on-surface-variant tracking-widest mb-4 block uppercase">나의 초대코드</span>
<div class="flex items-center justify-center gap-3 mb-6">
<div class="bg-surface-container-lowest px-6 py-4 rounded-md shadow-[0_8px_20px_-6px_rgba(174,47,52,0.08)]">
<span class="text-3xl font-headline font-black tracking-[0.2em] text-primary">A3F 82K</span>
</div>
<button class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="content_copy">content_copy</span>
</button>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="bg-gradient-to-br from-primary to-primary-container text-white font-semibold py-4 rounded-md shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="content_copy">content_copy</span>
                    코드 복사
                </button>
<button class="kakao-yellow font-bold py-4 rounded-md shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="chat">chat</span>
                    카카오톡으로 공유
                </button>
</div>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
<span class="text-sm font-medium text-on-surface-variant px-2">또는</span>
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
</div>
<!-- Input Section -->
<div class="space-y-4">
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-md py-5 px-6 text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary-fixed focus:bg-primary-fixed transition-all outline-none font-bold tracking-widest text-center text-lg" placeholder="상대방의 초대코드 입력" type="text"/>
</div>
<button class="w-full bg-on-surface text-surface-container-lowest font-bold py-5 rounded-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                연결하기
                <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-xl z-50 shadow-[0_-8px_32px_-4px_rgba(174,47,52,0.08)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-rose-400 transition-colors scale-110 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium mt-1">캘린더</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-rose-400 transition-colors scale-110 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium mt-1">대시보드</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-rose-400 transition-colors scale-110 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium mt-1">추가</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-rose-400 transition-colors scale-110 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium mt-1">예산</span>
</a>
<a class="flex flex-col items-center justify-center bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-200 rounded-full px-5 py-2 hover:text-rose-400 transition-colors scale-110 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium mt-1">설정</span>
</a>
</nav>

<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Our Sanctuary - Couples Expense Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>

        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-nav {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-low": "#f4f4f2",
                      "on-tertiary": "#ffffff",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "inverse-surface": "#2f3130",

                      "surface-bright": "#f9f9f7",
                      "on-surface": "#1a1c1b",
                      "background": "#f9f9f7",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "on-tertiary-container": "#f9fdff",
                      "surface-dim": "#dadad8",
                      "surface": "#f9f9f7",
                      "tertiary": "#565d5f",
                      "primary": "#005da7",

                      "on-tertiary-fixed-variant": "#41484a",

                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"

          },

<style>
        body {
          min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- Top App Bar -->
<nav class="w-full top-0 sticky z-50 bg-[#f9f9f7]/90 dark:bg-slate-950/90 backdrop-blur-md flex justify-between items-center px-6 py-3 border-b border-surface-container-high/50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-white shadow-sm">
<img alt="Couple profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvkH6_VH8WURHl1hBwoBmPzA8aUdJAFQlhtMk-l241eNU5VP-3Ol0UvYN-VMc-YS2U8hiNZjLXcNkPXdISpdqNreULRvPB8EI1mjx8VO7iAFi8uofggBoarEqlKZV3QEqcTMozZ3kHIV1ZOODFbVwJ_BwZC6XW-85ic0ciNm8KCu3-649sTCCgaSoh-iwUbOsHIbc9ZJGvhv9n_DSDwlADN5eQNO2V0B8-ALggbWQqnRc7abMIT8fwDPuOkE436mh-bAKOyNM_ZaY"/>
</div>
<span class="text-lg font-bold text-[#0060ac] dark:text-[#4A90E2] font-headline tracking-tight whitespace-nowrap">Our Sanctuary</span>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-[#414751] hover:opacity-80 transition-opacity p-2 text-xl">calendar_month</button>
</div>
</nav>
<main class="max-w-md mx-auto px-5 space-y-5 mt-3">
<!-- Month Selector -->
<header class="flex items-center justify-between">
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="text-sm font-bold font-headline">2026년 4월</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</header>
<!-- Hero: Total Spending -->
<section class="space-y-1">
<p class="text-on-surface-variant text-xs font-medium">이번 달 총 지출</p>
<div class="flex items-end justify-between gap-2">
<h1 class="text-4xl font-extrabold leading-none tracking-tight text-on-surface whitespace-nowrap">1,847,200원</h1>
<div class="pb-1 shrink-0">
<span class="bg-error-container text-on-error-container px-2 py-0.5 rounded-full text-[10px] font-bold flex items-center gap-0.5 whitespace-nowrap">
<span class="material-symbols-outlined text-[12px]">trending_up</span>
                        +12% vs 3월
                    </span>
</div>
</div>
</section>
<!-- Budget Section -->
<section class="bg-surface-container-lowest p-5 rounded-xl shadow-[0px_12px_24px_rgba(0,96,172,0.03)] border border-surface-container">
<div class="flex justify-between items-center mb-3">
<p class="text-on-surface-variant text-sm font-medium">남은 예산</p>
<span class="text-[10px] font-bold text-primary px-2 py-0.5 bg-primary/10 rounded-full">D-12</span>
</div>
<h2 class="text-2xl font-bold mb-4">652,800원</h2>
<div class="space-y-2">
<div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 74%"></div>
</div>
<div class="flex justify-between text-[10px] font-medium text-on-surface-variant">
<span>사용액 74%</span>
<span>총 예산 2,500,000원</span>
</div>
</div>
</section>

<section class="space-y-3">

<button class="text-primary text-xs font-bold">전체보기</button>
</div>
<div class="grid grid-cols-2 gap-3">
<!-- Card 1 -->
<div class="bg-surface-container-lowest p-3 rounded-xl border border-surface-container flex flex-col items-center text-center">
<div class="relative w-14 h-14 mb-2">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<circle class="text-surface-container-low" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-primary" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-dasharray="100.5" stroke-dashoffset="28.1" stroke-width="3"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-[10px] font-bold">72%</span>
</div>
</div>
<p class="font-bold text-xs mb-0.5 truncate w-full px-1">오마카세 데이트</p>
<p class="text-[9px] text-on-surface-variant">144k / 200k</p>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest p-3 rounded-xl border border-surface-container flex flex-col items-center text-center">
<div class="relative w-14 h-14 mb-2">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<circle class="text-surface-container-low" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-primary" cx="18" cy="18" fill="transparent" r="16" stroke="currentColor" stroke-dasharray="100.5" stroke-dashoffset="55.3" stroke-width="3"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-[10px] font-bold">45%</span>
</div>
</div>
<p class="font-bold text-xs mb-0.5 truncate w-full px-1">제주도 여행</p>
<p class="text-[9px] text-on-surface-variant">540k / 1.2M</p>
</div>
</div>
</section>
<!-- Category Breakdown & Spending Trend (Bento) -->
<div class="grid grid-cols-1 gap-3">
<!-- Donut Chart Widget -->
<section class="bg-surface-container-low p-4 rounded-xl">
<h3 class="text-[10px] font-bold text-on-surface-variant mb-4 uppercase tracking-wider">지출 카테고리</h3>
<div class="flex items-center justify-between gap-4">
<div class="relative w-24 h-24 shrink-0">
<svg class="w-full h-full" viewbox="0 0 36 36">
<path class="text-primary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="42, 100" stroke-width="5"></path>
<path class="text-primary-container" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="18, 100" stroke-dashoffset="-42" stroke-width="5"></path>
<path class="text-outline-variant" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="40, 100" stroke-dashoffset="-60" stroke-width="5"></path>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="text-[8px] text-on-surface-variant font-bold leading-none">최대 지출</span>
<span class="text-[10px] font-bold mt-0.5 whitespace-nowrap">🍽️ 식비</span>
</div>
</div>
<div class="space-y-2 flex-1 min-w-0">
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary shrink-0"></div>
<span class="text-[11px] font-medium truncate">🍽️ 식비 42%</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container shrink-0"></div>
<span class="text-[11px] font-medium truncate">☕ 카페 18%</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant shrink-0"></div>
<span class="text-[11px] font-medium truncate">🏠 기타 40%</span>
</div>
</div>
</div>
</section>
<!-- Spending Trend -->
<section class="bg-surface-container-highest p-4 rounded-xl">
<div class="flex justify-between items-center mb-4">
<h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">최근 7일 트렌드</h3>
<span class="text-[9px] font-bold text-on-surface-variant">4.14 - 4.20</span>
</div>
<div class="flex items-end justify-between h-16 gap-1.5">
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[40%]"></div>
<span class="text-[9px] font-bold">14</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[65%]"></div>
<span class="text-[9px] font-bold">15</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[30%]"></div>
<span class="text-[9px] font-bold">16</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary rounded-t-sm h-[90%]"></div>
<span class="text-[9px] font-bold text-primary">17</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[50%]"></div>
<span class="text-[9px] font-bold">18</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[75%]"></div>
<span class="text-[9px] font-bold">19</span>
</div>
<div class="flex flex-col items-center gap-1.5 flex-1">
<div class="w-full bg-primary-container/40 rounded-t-sm h-[45%]"></div>
<span class="text-[9px] font-bold">20</span>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-2 pb-6 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md rounded-t-[24px] z-50 shadow-[0px_-12px_24px_rgba(0,96,172,0.05)] border-t border-slate-100/10">
<!-- Calendar -->
<button class="flex flex-col items-center justify-center text-[#414751] dark:text-slate-400 hover:bg-[#f4f4f2] dark:hover:bg-slate-800 transition-all active:scale-90 px-3 py-1">
<span class="material-symbols-outlined mb-0.5 text-xl">calendar_today</span>
<span class="text-[10px] font-medium">Calendar</span>
</button>
<!-- Dashboard (Active) -->
<button class="flex flex-col items-center justify-center bg-[#0060ac]/10 text-[#0060ac] dark:text-[#4A90E2] rounded-xl px-3 py-1 transition-all active:scale-90">
<span class="material-symbols-outlined mb-0.5 text-xl" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="text-[10px] font-bold">Dashboard</span>
</button>
<!-- Add (FAB Style) -->
<button class="flex flex-col items-center justify-center text-[#0060ac] transition-all active:scale-90 px-2">
<span class="material-symbols-outlined text-3xl mb-0.5">add_circle</span>
<span class="text-[10px] font-medium">Add</span>
</button>
<!-- Savings -->
<button class="flex flex-col items-center justify-center text-[#414751] dark:text-slate-400 hover:bg-[#f4f4f2] dark:hover:bg-slate-800 transition-all active:scale-90 px-3 py-1">
<span class="material-symbols-outlined mb-0.5 text-xl">savings</span>
<span class="text-[10px] font-medium">Savings</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-[#414751] dark:text-slate-400 hover:bg-[#f4f4f2] dark:hover:bg-slate-800 transition-all active:scale-90 px-3 py-1">
<span class="material-symbols-outlined mb-0.5 text-xl">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</button>

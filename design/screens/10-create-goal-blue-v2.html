<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#dde4e6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#414751",
                        "on-background": "#1a1c1b",
                        "inverse-surface": "#2f3130",
                        "secondary": "#526069",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#fdfcff",
                        "on-tertiary-container": "#f9fdff",
                        "surface-container-highest": "#e2e3e1",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bac9d3",
                        "inverse-on-surface": "#f1f1ef",
                        "tertiary-container": "#6f7678",
                        "surface-tint": "#0060ac",
                        "outline-variant": "#c1c7d3",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f9f9f7",
                        "surface-container": "#eeeeec",
                        "primary-container": "#2976c7",
                        "on-tertiary-fixed": "#161d1f",
                        "surface-variant": "#e2e3e1",
                        "tertiary": "#565d5f",
                        "surface-container-high": "#e8e8e6",
                        "on-surface": "#1a1c1b",
                        "tertiary-fixed-dim": "#c1c8ca",
                        "on-primary-fixed": "#001c39",
                        "surface-dim": "#dadad8",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#3b4951",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d4e3ff",
                        "outline": "#717783",
                        "on-tertiary-fixed-variant": "#41484a",
                        "on-primary-fixed-variant": "#004883",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#0f1d25",
                        "background": "#f9f9f7",
                        "on-secondary-container": "#56656e",
                        "inverse-primary": "#a4c9ff",
                        "primary": "#005da7",
                        "surface-container-low": "#f4f4f2",
                        "secondary-fixed": "#d6e5ef",
                        "surface": "#f9f9f7",
                        "secondary-container": "#d3e2ed"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-xl flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-800" data-icon="close">close</span>
</button>
<h1 class="text-neutral-800 font-bold tracking-tight text-lg">새 목표 만들기</h1>
</div>
<div class="w-6"></div> <!-- Spacer for centering title if needed by type -->
</header>
<main class="pt-20 px-6 max-w-md mx-auto space-y-8">
<!-- 1. Goal Photo -->
<section class="mt-4">
<div class="w-full aspect-[16/9] bg-surface-container-low rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 group hover:bg-surface-container transition-colors cursor-pointer overflow-hidden relative">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-outline text-3xl" data-icon="photo_camera">photo_camera</span>
<span class="text-on-surface-variant font-medium">사진 추가 (선택)</span>
</div>
<!-- Decorative faint overlay for editorial feel -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent pointer-events-none"></div>
</div>
</section>
<!-- 2. Goal Name -->
<section class="space-y-3">
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 text-lg font-semibold placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" placeholder="목표 이름" type="text"/>
</div>
<p class="text-sm text-on-surface-variant px-2">e.g., '제주도 여행', '맛집 탐방'</p>
</section>
<!-- 3. Goal Emoji -->
<section class="space-y-4">
<label class="text-sm font-bold text-on-surface-variant px-2">아이콘 선택</label>
<div class="flex overflow-x-auto no-scrollbar gap-3 pb-2 -mx-2 px-2">
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🍽️</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🏖️</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🎁</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🎧</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">👗</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🏠</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">💍</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🎂</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">✈️</div>
<div class="flex-shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-2xl shadow-sm border border-outline-variant/10 active:scale-90 transition-transform">🎮</div>
</div>
</section>
<!-- 4. Target Amount -->
<section class="space-y-4">
<label class="text-sm font-bold text-on-surface-variant px-2">목표 금액</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 text-2xl font-bold text-primary text-right focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="0 원"/>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-surface-container-high rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">100,000</button>
<button class="px-4 py-2 bg-surface-container-high rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">300,000</button>
<button class="px-4 py-2 bg-surface-container-high rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">500,000</button>
<button class="px-4 py-2 bg-surface-container-high rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">1,000,000</button>
</div>
</section>
<!-- 5. Target Date -->
<section class="space-y-4">
<label class="text-sm font-bold text-on-surface-variant px-2">목표 날짜</label>
<div class="w-full bg-surface-container-highest rounded-full px-6 py-4 flex items-center justify-between">
<span class="text-lg font-semibold">2024.12.31</span>
<span class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
</div>
<!-- Analysis Card -->
<div class="bg-white rounded-lg p-5 flex items-center justify-between shadow-[0px_24px_48px_rgba(0,96,172,0.06)] relative overflow-hidden group">
<div class="z-10">
<div class="flex items-center gap-2 mb-1">
<span class="text-primary font-extrabold text-xl">D-45일 남음</span>
</div>
<p class="text-sm text-on-surface-variant font-medium">하루 약 <span class="text-primary font-bold">22,200원</span>씩 모으면 달성!</p>
</div>
<div class="z-10">
<div class="w-10 h-10 bg-primary-fixed rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="trending_up">trending_up</span>
</div>
</div>
<!-- Subtle background flourish -->
<div class="absolute -right-4 -bottom-4 w-24 h-24 bg-primary/5 rounded-full blur-2xl"></div>
</div>
</section>
<!-- 6. Priority -->
<section class="space-y-4">
<label class="text-sm font-bold text-on-surface-variant px-2">우선순위</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center py-4 bg-surface-container-low rounded-lg border-2 border-transparent transition-all active:scale-95">
<span class="text-xl mb-1">🔥</span>
<span class="text-sm font-bold text-on-surface-variant">높음</span>
</button>
<button class="flex flex-col items-center justify-center py-4 bg-primary-fixed/30 border-2 border-primary-container rounded-lg transition-all active:scale-95 ring-2 ring-primary/10">
<span class="text-xl mb-1">⭐</span>
<span class="text-sm font-bold text-primary">보통</span>
</button>
<button class="flex flex-col items-center justify-center py-4 bg-surface-container-low rounded-lg border-2 border-transparent transition-all active:scale-95">
<span class="text-xl mb-1">💤</span>
<span class="text-sm font-bold text-on-surface-variant">낮음</span>
</button>
</div>
</section>
<!-- 7. Memo -->
<section class="space-y-4">
<label class="text-sm font-bold text-on-surface-variant px-2">메모</label>
<textarea class="w-full bg-surface-container-highest border-none rounded-lg px-6 py-4 focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="목표 설명 (선택)" rows="3"></textarea>
</section>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-lg z-50">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold text-lg shadow-[0px_24px_48px_rgba(0,96,172,0.2)] active:scale-95 transition-transform flex items-center justify-center gap-2">
            목표 만들기 🎯
        </button>
</div>
<!-- Images & Visual Decorations (None requested in content but following standard) -->
<!-- For visual depth, placing a tiny watermark-like detail -->
<div class="fixed top-24 -left-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-32 -right-12 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
